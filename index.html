<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shameeco SEO Tools</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#141414;
    color:#fff;
}

.container{
    max-width:1200px;
    margin:auto;
    padding:50px 20px;
}

h1{
    text-align:center;
    color:#FF6B00;
    margin-bottom:10px;
}

.subtitle{
    text-align:center;
    color:#bbb;
    margin-bottom:40px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
    gap:25px;
}

.card{
    background:#222;
    border-radius:10px;
    padding:25px;
    transition:.3s;
}

.card:hover{
    transform:translateY(-5px);
}

.card h2{
    color:#FF6B00;
    margin-top:0;
}

.card p{
    color:#ccc;
    line-height:1.6;
}

.btn{
    display:inline-block;
    margin-top:15px;
    padding:12px 20px;
    background:#FF6B00;
    color:#fff;
    text-decoration:none;
    border-radius:6px;
}

.footer{
    text-align:center;
    margin-top:60px;
    color:#888;
}
</style>

</head>

<body>

<div class="container">

<h1>Free SEO Tools</h1>

<p class="subtitle">
Professional SEO Tools by <strong>Shameeco</strong>
</p>

<div class="grid">

<div class="card">
<h2>Meta Title Generator</h2>
<p>Create SEO-friendly meta titles and meta descriptions instantly.</p>

<a class="btn" href="meta-title-generator/">
Open Tool
</a>

</div>

<div class="card">
<h2>Word Counter</h2>
<p>Count words, characters and paragraphs for SEO content.</p>

<a class="btn" href="word-counter/">
Open Tool
</a>

</div>

</div>

<div class="footer">

© 2026 Shameeco

</div>

</div>

</body>
</html>
