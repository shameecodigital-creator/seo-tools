<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Word Counter | Shameeco</title>

<style>
body{
    font-family:Arial,sans-serif;
    background:#141414;
    color:#fff;
    max-width:900px;
    margin:auto;
    padding:40px;
}

h1{
    color:#FF6B00;
}

textarea{
    width:100%;
    height:250px;
    padding:15px;
    font-size:16px;
    border-radius:6px;
    border:1px solid #333;
    resize:vertical;
}

.result{
    margin-top:25px;
    background:#222;
    padding:20px;
    border-radius:8px;
}

.result p{
    font-size:18px;
    margin:10px 0;
}

button{
    margin-top:15px;
    background:#FF6B00;
    color:#fff;
    border:none;
    padding:12px 25px;
    font-size:16px;
    border-radius:5px;
    cursor:pointer;
}
</style>

</head>

<body>

<h1>Word Counter</h1>

<p>Paste or type your content below.</p>

<textarea id="text" oninput="countText()"></textarea>

<button onclick="document.getElementById('text').value='';countText();">
Clear Text
</button>

<div class="result">

<p><strong>Words:</strong> <span id="words">0</span></p>

<p><strong>Characters:</strong> <span id="characters">0</span></p>

<p><strong>Characters (Without Spaces):</strong> <span id="charactersNoSpace">0</span></p>

<p><strong>Paragraphs:</strong> <span id="paragraphs">0</span></p>

</div>

<script>

function countText(){

let text=document.getElementById("text").value;

let words=text.trim().length===0 ? 0 : text.trim().split(/\s+/).length;

let characters=text.length;

let charactersNoSpace=text.replace(/\s/g,"").length;

let paragraphs=text.trim().length===0 ? 0 : text.split(/\n+/).filter(p=>p.trim()!=="").length;

document.getElementById("words").innerHTML=words;

document.getElementById("characters").innerHTML=characters;

document.getElementById("charactersNoSpace").innerHTML=charactersNoSpace;

document.getElementById("paragraphs").innerHTML=paragraphs;

}

</script>

</body>
</html>
